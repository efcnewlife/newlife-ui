name: Publish to GitHub Packages

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Ensure package version matches git tag
        if: github.ref_type == 'tag'
        run: |
          pkg_version=$(node -p "require('./package.json').version")
          if [ "${pkg_version}" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::package.json version (${pkg_version}) does not match tag (${GITHUB_REF_NAME})"
            exit 1
          fi

      # Version comes from package.json "packageManager" (pnpm/action-setup forbids duplicating it)
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          registry-url: https://npm.pkg.github.com
          scope: "@efcnewlife"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Publish
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGE_TOKEN }}

  release:
    name: Create GitHub Release
    needs: publish
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Build release notes from CHANGELOG
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          file="CHANGELOG.md"
          out="release_body.md"
          rm -f extracted.md
          if [[ -f "${file}" ]]; then
            awk -v ver="${tag}" '
              /^## \[/ {
                if (p) exit
                if ($0 ~ "\\[" ver "\\]") { p=1; print; next }
                next
              }
              p { print }
            ' "${file}" > extracted.md || true
          fi
          if [[ -f extracted.md ]] && [[ -s extracted.md ]]; then
            mv extracted.md "${out}"
          else
            {
              echo "## Summary"
              echo ""
              echo "No \`CHANGELOG.md\` section found for \`${tag}\`. Add \`## [${tag}]\` (Keep a Changelog style) before tagging, or rely on the auto-generated list below."
              echo ""
            } > "${out}"
          fi

      # softprops/action-gh-release@v2 still declares `runs.using: node20`, so GitHub may show a Node 20
      # deprecation notice on the run summary. The action author is working on a Node 24 upgrade; until a
      # new release ships, `FORCE_JAVASCRIPT_ACTIONS_TO_NODE24` (workflow env above) opts JS actions into Node 24.
      # https://github.com/softprops/action-gh-release/pull/670
      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_body.md
          generate_release_notes: true
          make_latest: true
